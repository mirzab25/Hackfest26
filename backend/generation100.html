<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generation 100</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0a0a08; min-height: 100vh; color: #e0e0e0; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  #splash {
    flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a08; padding: 24px; text-align: center;
    position: relative; overflow: hidden;
  }
  #splash::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 30% 80%, rgba(160,120,40,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 20%, rgba(100,70,20,0.05) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, rgba(20,20,15,0.8) 0%, transparent 70%);
    pointer-events:none;
  }
  #splash::after {
    content:''; position:absolute; inset:0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; opacity:0.6;
  }
  #splash > * { position: relative; z-index: 1; }
  #splash .splash-year {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;
    color: #6a5a30; margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  #splash .splash-year .yr-line { width: 40px; height: 1px; background: #6a5a30; }
  #splash h1 {
    font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 800;
    letter-spacing: -1px; margin: 0 0 6px;
    background: linear-gradient(160deg, #e8d5a0, #c4a040, #8a6e20);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  #splash .splash-tagline {
    font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic;
    color: #7a6a40; margin-bottom: 32px;
  }
  #splash .sub {
    color: #8a7a60; font-size: 14px; max-width: 420px; line-height: 1.7; margin-bottom: 36px;
  }
  #splash .splash-footer {
    position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: #3a3520;
  }

  .btn-main { padding: 15px 44px; border-radius: 50px; border: none; cursor: pointer; background: linear-gradient(135deg, #43A047, #2E7D32); color: white; font-size: 16px; font-weight: 700; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 24px rgba(46,125,50,0.4); transition: transform 0.2s; }
  .btn-main:hover { transform: scale(1.05); }
  .btn-main:disabled { background: #333; box-shadow: none; cursor: default; transform: none; color: #666; }

  #survey { flex-direction: column; align-items: center; padding: 32px 16px; background: linear-gradient(180deg, #0a0a08 0%, #0d1a0d 100%); }
  .survey-wrap { max-width: 560px; width: 100%; }
  .survey-header { margin-bottom: 32px; }
  .survey-header .eyebrow { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #66BB6A; margin-bottom: 8px; }
  .survey-header h2 { font-family: 'Playfair Display', serif; font-size: 30px; color: #E8F5E9; font-weight: 700; margin-bottom: 6px; }
  .survey-header p { color: #6a8a6a; font-size: 14px; }
  .progress-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #66BB6A, #2E7D32); border-radius: 2px; transition: width 0.4s ease; }
  .question-block { margin-bottom: 28px; }
  .question-block .q-text { font-size: 16px; font-weight: 600; color: #C8E6C9; margin-bottom: 14px; line-height: 1.5; }
  .option-btn { display: block; width: 100%; padding: 13px 18px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); cursor: pointer; text-align: left; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #a0b8a0; transition: all 0.2s; margin-bottom: 8px; }
  .option-btn:hover { border-color: rgba(76,175,80,0.3); background: rgba(76,175,80,0.06); color: #C8E6C9; }
  .option-btn.selected { border-color: #2E7D32; background: rgba(46,125,50,0.12); color: #A5D6A7; font-weight: 600; }
  .btn-full { width: 100%; border-radius: 12px; padding: 15px; margin-top: 12px; }

  #results { flex-direction: column; align-items: center; padding: 32px 16px; background: #0a0a08; }
  .results-wrap { max-width: 600px; width: 100%; }
  .landscape-container { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; margin-bottom: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .landscape-container canvas { width: 100%; height: 100%; display: block; }
  .stage-badge { text-align: center; margin-bottom: 24px; }
  .stage-badge .stage-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .stage-badge .stage-desc { font-size: 13px; color: #6a8a6a; max-width: 400px; margin: 0 auto; }
  .score-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .score-card h3 { font-size: 15px; font-weight: 700; color: #C8E6C9; margin-bottom: 18px; }
  .bar-row { margin-bottom: 14px; }
  .bar-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-label { font-size: 13px; font-weight: 600; color: #a0b8a0; }
  .bar-val { font-size: 13px; font-weight: 700; }
  .bar-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .overall-row { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  .overall-label { font-size: 16px; font-weight: 700; color: #E8F5E9; }
  .overall-val { font-size: 28px; font-weight: 800; }

  #goals { flex-direction: column; align-items: center; padding: 32px 16px; background: linear-gradient(180deg, #0a0a08, #0d1a0d); }
  .goals-wrap { max-width: 560px; width: 100%; }
  .goal-header { margin-bottom: 20px; }
  .goal-header .eyebrow { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #66BB6A; margin-bottom: 6px; }
  .goal-header h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: #E8F5E9; font-weight: 700; margin-bottom: 6px; }
  .goal-header p { color: #6a8a6a; font-size: 14px; }
  .goal-card { padding: 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s; border: 1.5px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .goal-card:hover { border-color: rgba(76,175,80,0.2); }
  .goal-card.done { border-color: #2E7D32; background: rgba(46,125,50,0.1); }
  .goal-check { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); color: #555; font-size: 15px; font-weight: 700; transition: all 0.3s; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.08); }
  .goal-card.done .goal-check { background: #2E7D32; color: white; border-color: #2E7D32; }
  .goal-text { font-size: 14px; font-weight: 500; color: #C8E6C9; margin: 0; }
  .goal-card.done .goal-text { text-decoration: line-through; opacity: 0.6; }
  .goal-meta { font-size: 12px; color: #5a7a5a; margin: 4px 0 0; }
  .btn-secondary { width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.08); background: transparent; color: #888; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: #bbb; }
  .mini-canvas-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .mini-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div id="splash" class="screen active">
  <div class="splash-year"><span class="yr-line"></span> 2026 &mdash; 2126 <span class="yr-line"></span></div>
  <h1>Generation 100</h1>
  <p class="splash-tagline">Your actions today. Their world tomorrow.</p>
  <p class="sub">Take a quick survey to see the environmental future your habits are building. Then take on daily challenges to transform your world from wasteland to paradise.</p>
  <button class="btn-main" onclick="startSurvey()">Begin Survey</button>
  <div class="splash-footer">Webster Hackfest 2026 &middot; Sustainability &amp; the Future</div>
</div>

<div id="survey" class="screen"><div class="survey-wrap" id="survey-content"></div></div>
<div id="results" class="screen"><div class="results-wrap" id="results-content"></div></div>
<div id="goals" class="screen"><div class="goals-wrap" id="goals-content"></div></div>

<script>
const CATEGORIES=["energy","consumption","water"];
const CAT_LABELS={energy:"Energy & Transport",consumption:"Consumption & Waste",water:"Water Usage"};
const CAT_ICONS={energy:"\u26A1",consumption:"\u267B\uFE0F",water:"\uD83D\uDCA7"};

const SURVEY_QUESTIONS=[
  {id:"q1",cat:"energy",text:"How do you usually get to school or work?",options:[{label:"Walk or bike",score:10},{label:"Public transit",score:7},{label:"Carpool",score:5},{label:"Drive alone",score:2}]},
  {id:"q2",cat:"energy",text:"Do you turn off lights when leaving a room?",options:[{label:"Always",score:10},{label:"Usually",score:7},{label:"Sometimes",score:4},{label:"Rarely",score:1}]},
  {id:"q3",cat:"energy",text:"For trips under 2 miles, how do you travel?",options:[{label:"Walk or bike",score:10},{label:"Scooter or skateboard",score:8},{label:"Drive",score:2}]},
  {id:"q4",cat:"energy",text:"Do you unplug electronics when not in use?",options:[{label:"Always",score:10},{label:"Sometimes",score:5},{label:"Never",score:1}]},
  {id:"q5",cat:"energy",text:"How often do you fly per year?",options:[{label:"Never",score:10},{label:"1-2 times",score:7},{label:"3-5 times",score:4},{label:"6+ times",score:1}]},
  {id:"q6",cat:"energy",text:"Does your household use any renewable energy?",options:[{label:"Solar / wind at home",score:10},{label:"Green energy plan",score:7},{label:"No / not sure",score:2}]},
  {id:"q7",cat:"consumption",text:"How often do you bring a reusable bag when shopping?",options:[{label:"Always",score:10},{label:"Usually",score:7},{label:"Sometimes",score:4},{label:"Never",score:1}]},
  {id:"q8",cat:"consumption",text:"How do you handle items you no longer need?",options:[{label:"Donate or sell",score:10},{label:"Recycle if possible",score:7},{label:"Throw away",score:2}]},
  {id:"q9",cat:"consumption",text:"Do you sort your recycling?",options:[{label:"Yes, always",score:10},{label:"When convenient",score:5},{label:"No",score:1}]},
  {id:"q10",cat:"consumption",text:"How many single-use plastic bottles per week?",options:[{label:"None, I use reusable",score:10},{label:"1-3",score:6},{label:"4-7",score:3},{label:"8+",score:1}]},
  {id:"q11",cat:"consumption",text:"How often do you buy second-hand or thrifted items?",options:[{label:"Frequently",score:10},{label:"Sometimes",score:6},{label:"Rarely",score:3},{label:"Never",score:1}]},
  {id:"q12",cat:"consumption",text:"Do you compost food scraps?",options:[{label:"Yes",score:10},{label:"Sometimes",score:5},{label:"No",score:1}]},
  {id:"q13",cat:"water",text:"How long are your typical showers?",options:[{label:"Under 5 min",score:10},{label:"5-10 min",score:7},{label:"10-15 min",score:4},{label:"Over 15 min",score:1}]},
  {id:"q14",cat:"water",text:"Do you run the faucet while brushing your teeth?",options:[{label:"Never",score:10},{label:"Sometimes",score:5},{label:"Always",score:1}]},
  {id:"q15",cat:"water",text:"Do you run the dishwasher with a full load?",options:[{label:"Always full loads",score:10},{label:"Usually",score:7},{label:"Often partial",score:3}]},
  {id:"q16",cat:"water",text:"Do you ever reuse water (pasta water for plants, etc.)?",options:[{label:"Regularly",score:10},{label:"Occasionally",score:5},{label:"Never",score:1}]},
  {id:"q17",cat:"water",text:"Have you installed water-saving fixtures?",options:[{label:"Yes, several",score:10},{label:"One or two",score:6},{label:"None / not sure",score:2}]}
];

const DAILY_GOALS_POOL={
  energy:[{text:"Walk or bike instead of driving for one trip today",points:15},{text:"Unplug 3 devices you aren't using right now",points:10},{text:"Turn off all lights when leaving each room today",points:10},{text:"Air dry your clothes instead of using the dryer",points:15},{text:"Keep your thermostat 2 degrees closer to outside temp",points:12},{text:"Take public transit or carpool for one trip",points:12},{text:"Limit screen time by 1 hour to save energy",points:8}],
  consumption:[{text:"Use a reusable bag for all purchases today",points:10},{text:"Repair one item instead of throwing it away",points:15},{text:"Sort and properly recycle everything today",points:10},{text:"Donate one item you no longer need",points:12},{text:"Bring your own container for any takeout",points:10},{text:"Avoid buying anything in single-use plastic",points:12},{text:"Compost your food scraps today",points:15}],
  water:[{text:"Take a shower under 5 minutes today",points:12},{text:"Turn off the faucet while brushing your teeth",points:8},{text:"Only run the dishwasher with a full load",points:10},{text:"Collect and reuse water for plants",points:15},{text:"Water plants in early morning or evening only",points:10},{text:"Use a bucket instead of a hose for washing",points:12},{text:"Avoid running water while washing dishes by hand",points:10}]
};

let currentQ=0,answers={},catScores={energy:0,consumption:0,water:0},overallScore=0;
let dailyGoals=[],completedGoals=new Set(),allCompletedTexts=[],goalDay=1,bonusPoints=0;

// ═══ LANDSCAPE CANVAS RENDERER ═══

function pseudoRand(s){let x=Math.sin(s*127.1+311.7)*43758.5453;return x-Math.floor(x);}
function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));}
function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return`rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

function renderLandscape(canvas,score){
  const W=960,H=540;canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const t=Math.max(0,Math.min(score/100,1));

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H*0.6);
  if(t<0.3){sky.addColorStop(0,lerpColor('#4a3820','#6b5030',t/0.3));sky.addColorStop(0.5,lerpColor('#8a7050','#9a8060',t/0.3));sky.addColorStop(1,lerpColor('#b09060','#a09070',t/0.3));}
  else if(t<0.6){const p=(t-0.3)/0.3;sky.addColorStop(0,lerpColor('#6b5030','#4a6a8a',p));sky.addColorStop(0.5,lerpColor('#9a8060','#7a9ab0',p));sky.addColorStop(1,lerpColor('#a09070','#a0bac0',p));}
  else{const p=(t-0.6)/0.4;sky.addColorStop(0,lerpColor('#4a6a8a','#2a6aaa',p));sky.addColorStop(0.5,lerpColor('#7a9ab0','#6ab0d8',p));sky.addColorStop(1,lerpColor('#a0bac0','#b0dae8',p));}
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Sun
  if(t>0.3){const op=Math.min((t-0.3)/0.5,1),sy=lerp(120,80,t),sg=ctx.createRadialGradient(W*0.75,sy,0,W*0.75,sy,120);
    sg.addColorStop(0,`rgba(255,240,180,${op*0.9})`);sg.addColorStop(0.3,`rgba(255,220,120,${op*0.4})`);sg.addColorStop(1,'rgba(255,200,80,0)');ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);}

  // Haze + dust
  if(t<0.5){const ho=(1-t*2)*0.25;ctx.fillStyle=`rgba(180,150,100,${ho})`;ctx.fillRect(0,H*0.3,W,H*0.4);
    for(let i=0;i<30*(1-t*2);i++){ctx.fillStyle=`rgba(200,170,120,${0.15+pseudoRand(i)*0.15})`;ctx.beginPath();ctx.arc(pseudoRand(i*7)*W,pseudoRand(i*13+5)*H*0.7,1+pseudoRand(i*3)*2,0,Math.PI*2);ctx.fill();}}

  // Ground
  const gY=H*0.58;const gnd=ctx.createLinearGradient(0,gY,0,H);
  if(t<0.25){gnd.addColorStop(0,'#6a5530');gnd.addColorStop(0.4,'#5a4520');gnd.addColorStop(1,'#3a2a10');}
  else if(t<0.5){const p=(t-0.25)/0.25;gnd.addColorStop(0,lerpColor('#6a5530','#5a6a3a',p));gnd.addColorStop(0.4,lerpColor('#5a4520','#4a5a2a',p));gnd.addColorStop(1,lerpColor('#3a2a10','#2a3a15',p));}
  else{const p=(t-0.5)/0.5;gnd.addColorStop(0,lerpColor('#5a6a3a','#3a7a30',p));gnd.addColorStop(0.4,lerpColor('#4a5a2a','#2a6a22',p));gnd.addColorStop(1,lerpColor('#2a3a15','#1a4a15',p));}
  ctx.fillStyle=gnd;ctx.beginPath();ctx.moveTo(0,gY+15);
  for(let x=0;x<=W;x+=2){ctx.lineTo(x,gY+Math.sin(x*0.005)*18+Math.sin(x*0.012+1)*10+Math.sin(x*0.025)*5);}
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

  // Cracks
  if(t<0.45){const co=(1-t/0.45)*0.4;ctx.strokeStyle=`rgba(60,40,20,${co})`;ctx.lineWidth=1;
    for(let i=0;i<20;i++){const cx=pseudoRand(i*17)*W,cy=gY+30+pseudoRand(i*23)*(H-gY-40);ctx.beginPath();ctx.moveTo(cx,cy);for(let j=0;j<4;j++)ctx.lineTo(cx+(pseudoRand(i*31+j*7)-0.5)*60,cy+j*8+pseudoRand(i*11+j)*12);ctx.stroke();}}

  // Ruins
  if(t<0.4){const ro=(1-t/0.4)*0.6;drawRuin(ctx,W*0.15,gY,60,70,ro);drawRuin(ctx,W*0.75,gY,50,55,ro*0.8);if(t<0.2)drawRuin(ctx,W*0.5,gY,70,80,ro*0.7);}

  // Dead trees
  if(t<0.55){const dc=Math.floor((1-t/0.55)*6);for(let i=0;i<dc;i++){const tx=80+(i*W*0.8/dc)+pseudoRand(i*41)*60,ho=Math.sin(tx*0.005)*18+Math.sin(tx*0.012+1)*10;drawDeadTree(ctx,tx,gY+ho,50+pseudoRand(i*19)*50,Math.min(1-t/0.55,1),i);}}

  // Grass
  if(t>0.3){const gc=Math.floor((t-0.3)/0.7*120);for(let i=0;i<gc;i++){const gx=pseudoRand(i*53)*W,ho=Math.sin(gx*0.005)*18+Math.sin(gx*0.012+1)*10,gy=gY+ho+pseudoRand(i*37)*30,gh=8+pseudoRand(i*61)*14*t;
    ctx.strokeStyle=lerpColor(t>0.6?'#3a8a30':'#5a7a40','#2a7a22',pseudoRand(i*71));ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(gx,gy);ctx.quadraticCurveTo(gx+(pseudoRand(i*3)-0.5)*8,gy-gh*0.6,gx+(pseudoRand(i*9)-0.5)*6,gy-gh);ctx.stroke();}}

  // Living trees
  if(t>0.4){const tc=Math.floor((t-0.4)/0.6*8);for(let i=0;i<tc;i++){const tx=60+(i*(W-120)/Math.max(tc,1))+pseudoRand(i*47)*40,ho=Math.sin(tx*0.005)*18+Math.sin(tx*0.012+1)*10;
    drawLivingTree(ctx,tx,gY+ho,lerp(0.4,1,(t-0.4)/0.6)*(0.7+pseudoRand(i*29)*0.5),t,i);}}

  // Water
  if(t>0.5){const wo=Math.min((t-0.5)/0.3,0.7),wg=ctx.createLinearGradient(0,H*0.78,0,H*0.88);
    wg.addColorStop(0,`rgba(70,180,220,${wo*0.5})`);wg.addColorStop(1,`rgba(40,140,200,${wo*0.3})`);ctx.fillStyle=wg;ctx.beginPath();ctx.moveTo(0,H*0.82);
    for(let x=0;x<=W;x+=3)ctx.lineTo(x,H*0.82+Math.sin(x*0.02)*4+Math.sin(x*0.008)*8);ctx.lineTo(W,H*0.88);ctx.lineTo(0,H*0.88);ctx.closePath();ctx.fill();
    if(t>0.6)for(let i=0;i<15;i++){ctx.fillStyle=`rgba(200,240,255,${0.15+pseudoRand(i*31)*0.15})`;ctx.fillRect(pseudoRand(i*67)*W,H*0.82+pseudoRand(i*83)*H*0.05,12+pseudoRand(i*11)*20,1.5);}}

  // Flowers
  if(t>0.6){const fc=Math.floor((t-0.6)/0.4*30),cols=['#e05080','#f0a030','#d040c0','#f0e040','#f06030','#60a0f0'];
    for(let i=0;i<fc;i++){const fx=pseudoRand(i*79)*W,ho=Math.sin(fx*0.005)*18+Math.sin(fx*0.012+1)*10,fy=gY+ho+5+pseudoRand(i*43)*25,fr=3+pseudoRand(i*97)*3;
    ctx.strokeStyle='#3a7a30';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx,fy-10-pseudoRand(i*51)*8);ctx.stroke();
    ctx.fillStyle=cols[i%cols.length];ctx.beginPath();ctx.arc(fx,fy-12-pseudoRand(i*51)*8,fr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f0e870';ctx.beginPath();ctx.arc(fx,fy-12-pseudoRand(i*51)*8,fr*0.4,0,Math.PI*2);ctx.fill();}}

  // Birds
  if(t>0.65){const bc=Math.floor((t-0.65)/0.35*8);ctx.strokeStyle=`rgba(40,60,40,${0.5+t*0.3})`;ctx.lineWidth=1.5;
    for(let i=0;i<bc;i++){const bx=100+pseudoRand(i*89)*(W-200),by=40+pseudoRand(i*101)*80;ctx.beginPath();ctx.moveTo(bx-8,by);ctx.quadraticCurveTo(bx-4,by-6,bx,by);ctx.quadraticCurveTo(bx+4,by-6,bx+8,by);ctx.stroke();}}

  // Clouds
  if(t>0.4){const co=Math.min((t-0.4)/0.4,0.5);drawCloud(ctx,W*0.15,50,60,co*0.7);drawCloud(ctx,W*0.55,70,45,co*0.5);if(t>0.7)drawCloud(ctx,W*0.85,40,50,co*0.4);}

  // Solarpunk buildings
  if(t>0.8){const so=(t-0.8)/0.2;drawSolarpunk(ctx,W*0.12,gY-20,50,100,so*0.5,t);drawSolarpunk(ctx,W*0.88,gY-15,45,85,so*0.4,t);if(t>0.9)drawSolarpunk(ctx,W*0.5,gY-30,55,120,so*0.35,t);}

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.75);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,`rgba(0,0,0,${t<0.3?0.45:0.2})`);ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
}

function drawDeadTree(ctx,x,y,h,op,seed){
  ctx.save();ctx.globalAlpha=op;ctx.fillStyle='#3a2a18';ctx.beginPath();ctx.moveTo(x-4,y);ctx.lineTo(x-3,y-h);ctx.lineTo(x+3,y-h);ctx.lineTo(x+4,y);ctx.fill();
  ctx.strokeStyle='#3a2a18';ctx.lineWidth=2.5;ctx.lineCap='round';const br=2+Math.floor(pseudoRand(seed*71)*3);
  for(let b=0;b<br;b++){const by=y-h*(0.4+b*0.2),dir=b%2===0?1:-1,bl=15+pseudoRand(seed*31+b)*25;ctx.beginPath();ctx.moveTo(x,by);ctx.lineTo(x+dir*bl,by-10-pseudoRand(seed*13+b)*15);ctx.stroke();
    if(pseudoRand(seed*43+b)>0.4){ctx.beginPath();ctx.moveTo(x+dir*bl*0.6,by-8);ctx.lineTo(x+dir*bl*0.6+dir*10,by-20);ctx.stroke();}}ctx.restore();}

function drawLivingTree(ctx,x,y,sz,t,seed){
  const th=60*sz,cr=30*sz;ctx.fillStyle=t>0.7?'#4a3520':'#5a4530';ctx.beginPath();ctx.moveTo(x-5*sz,y);ctx.lineTo(x-3*sz,y-th);ctx.lineTo(x+3*sz,y-th);ctx.lineTo(x+5*sz,y);ctx.fill();
  const layers=3+Math.floor(sz*2);for(let l=0;l<layers;l++){const lx=x+(pseudoRand(seed*59+l)-0.5)*cr*0.8,ly=y-th-cr*0.3+(pseudoRand(seed*37+l)-0.5)*cr*0.6,lr=cr*(0.6+pseudoRand(seed*73+l)*0.5),sh=pseudoRand(seed*11+l);
    ctx.fillStyle=sh<0.33?(t>0.7?'#2a7a22':'#4a7a3a'):sh<0.66?(t>0.7?'#3a8a30':'#5a8a4a'):(t>0.7?'#228a1a':'#3a6a2a');ctx.beginPath();ctx.arc(lx,ly,lr,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=`rgba(150,220,120,${t>0.7?0.2:0.1})`;ctx.beginPath();ctx.arc(x-cr*0.2,y-th-cr*0.4,cr*0.5,0,Math.PI*2);ctx.fill();}

function drawCloud(ctx,x,y,sz,op){ctx.save();ctx.globalAlpha=op;ctx.fillStyle='white';
  ctx.beginPath();ctx.arc(x,y,sz*0.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*0.3,y-sz*0.1,sz*0.32,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-sz*0.3,y+sz*0.05,sz*0.28,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*0.1,y+sz*0.15,sz*0.25,0,Math.PI*2);ctx.fill();ctx.restore();}

function drawRuin(ctx,x,y,w,h,op){ctx.save();ctx.globalAlpha=op;ctx.fillStyle='#3a3028';ctx.fillRect(x-w/2,y-h,w,h);
  ctx.fillStyle='#2a2018';ctx.beginPath();ctx.moveTo(x-w/2-5,y-h);ctx.lineTo(x-w/4,y-h-15);ctx.lineTo(x,y-h-5);ctx.lineTo(x+w/4,y-h-20);ctx.lineTo(x+w/2+5,y-h+5);ctx.lineTo(x+w/2,y-h);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1a1008';ctx.fillRect(x-w/4-4,y-h*0.65,8,10);ctx.fillRect(x+w/4-4,y-h*0.65,8,10);ctx.fillRect(x-5,y-h*0.35,10,14);
  ctx.fillStyle='rgba(120,70,30,0.3)';ctx.fillRect(x-w/4,y-h*0.6,3,h*0.3);ctx.fillRect(x+w/5,y-h*0.5,2,h*0.25);ctx.restore();}

function drawSolarpunk(ctx,x,y,w,h,op,t){ctx.save();ctx.globalAlpha=op;const bg=ctx.createLinearGradient(x-w/2,y-h,x+w/2,y);
  bg.addColorStop(0,'rgba(180,220,200,0.5)');bg.addColorStop(0.5,'rgba(140,200,180,0.4)');bg.addColorStop(1,'rgba(100,160,140,0.3)');ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(x-w/2,y);ctx.quadraticCurveTo(x-w/2-5,y-h*0.5,x-w/4,y-h);ctx.quadraticCurveTo(x,y-h-15,x+w/4,y-h);ctx.quadraticCurveTo(x+w/2+5,y-h*0.5,x+w/2,y);ctx.closePath();ctx.fill();
  for(let i=0;i<4;i++){const ty=y-h*(0.2+i*0.2),tw=w*(0.8-i*0.1);ctx.fillStyle=`rgba(60,160,60,${0.4+i*0.05})`;ctx.fillRect(x-tw/2,ty,tw,4);
    ctx.fillStyle='rgba(50,140,50,0.3)';ctx.fillRect(x-tw/2+5,ty,3,8+i*3);ctx.fillRect(x+tw/2-8,ty,3,6+i*2);}ctx.restore();}

// ═══ HELPERS ═══

function barColor(p){return p>=70?'#2E7D32':p>=40?'#F9A825':'#C62828';}
function showScreen(id){document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function computeScores(){const ct={energy:[],consumption:[],water:[]};for(const q of SURVEY_QUESTIONS)if(answers[q.id]!==undefined)ct[q.cat].push(q.options[answers[q.id]].score);
  const s={};for(const c of CATEGORIES){const a=ct[c];s[c]=a.length>0?Math.round(a.reduce((x,y)=>x+y,0)/a.length*10):0;}return{scores:s,overall:Math.round((s.energy+s.consumption+s.water)/3)};}

function getStageInfo(s){
  if(s<15)return{name:'Barren Wasteland',desc:'A desolate, lifeless ruin. Crumbling structures dot the cracked earth under a dusty haze.',color:'#8a6a40'};
  if(s<30)return{name:'Dusty Ruins',desc:'Decay runs deep, but faint signs of resilience appear among the rubble.',color:'#9a7a50'};
  if(s<45)return{name:'First Signs of Life',desc:'Hardy grasses push through the dust. The air is heavy, but change is coming.',color:'#7a8a50'};
  if(s<60)return{name:'Recovery',desc:'Young trees take root. The landscape shifts from brown to green. Hope grows.',color:'#5a8a40'};
  if(s<75)return{name:'Thriving Ecosystem',desc:'Lush canopy, flowing rivers, and abundant life. The recovery is real.',color:'#3a8a30'};
  if(s<90)return{name:'Green Paradise',desc:'A vibrant, flourishing world. Flowers, wildlife, and crystal-clear water.',color:'#2a7a22'};
  return{name:'Solarpunk Utopia',desc:'Perfect harmony of nature and innovation. This is the future your choices create.',color:'#1a8a2a'};}

function generateDailyGoals(){const sorted=Object.entries(catScores).sort((a,b)=>a[1]-b[1]);const goals=[],used=new Set(allCompletedTexts);
  for(const[cat]of sorted){let pool=DAILY_GOALS_POOL[cat].filter(g=>!used.has(g.text));if(pool.length===0)pool=DAILY_GOALS_POOL[cat];if(pool.length>0)goals.push({...pool[Math.floor(Math.random()*pool.length)],cat});}
  for(const[cat]of sorted){if(goals.length>=4)break;let pool=DAILY_GOALS_POOL[cat].filter(g=>!used.has(g.text)&&!goals.find(x=>x.text===g.text));if(pool.length===0)pool=DAILY_GOALS_POOL[cat].filter(g=>!goals.find(x=>x.text===g.text));if(pool.length>0)goals.push({...pool[Math.floor(Math.random()*pool.length)],cat});}
  return goals.slice(0,4);}

// ═══ RENDER FUNCTIONS ═══

function startSurvey(){currentQ=0;answers={};renderSurveyQ();showScreen('survey');}

function renderSurveyQ(){
  const total=SURVEY_QUESTIONS.length,q=SURVEY_QUESTIONS[currentQ],prog=(currentQ+(answers[q.id]!==undefined?1:0))/total*100;
  let h=`<div class="survey-header"><p class="eyebrow">Question ${currentQ+1} of ${total}</p><h2>Baseline Survey</h2><p>${CAT_ICONS[q.cat]} ${CAT_LABELS[q.cat]}</p></div>`;
  h+=`<div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>`;
  h+=`<div class="question-block"><p class="q-text">${q.text}</p>`;
  q.options.forEach((opt,i)=>{h+=`<button class="option-btn${answers[q.id]===i?' selected':''}" onclick="pickAnswer('${q.id}',${i})">${opt.label}</button>`;});
  h+=`</div>`;
  const ok=answers[q.id]!==undefined;
  h+=currentQ<total-1?`<button class="btn-main btn-full" onclick="nextQ()" ${ok?'':'disabled'}>Next Question</button>`:`<button class="btn-main btn-full" onclick="finishSurvey()" ${ok?'':'disabled'}>See My Results</button>`;
  if(currentQ>0)h+=`<button class="btn-secondary" onclick="prevQ()">Back</button>`;
  document.getElementById('survey-content').innerHTML=h;}

function pickAnswer(qId,idx){answers[qId]=idx;renderSurveyQ();}
function nextQ(){if(currentQ<SURVEY_QUESTIONS.length-1){currentQ++;renderSurveyQ();window.scrollTo(0,0);}}
function prevQ(){if(currentQ>0){currentQ--;renderSurveyQ();window.scrollTo(0,0);}}

function finishSurvey(){const r=computeScores();catScores=r.scores;overallScore=r.overall;renderResults();showScreen('results');}

function renderResults(){
  const st=getStageInfo(overallScore);
  let h=`<div class="landscape-container"><canvas id="mainCanvas"></canvas></div>`;
  h+=`<div class="stage-badge"><p class="stage-name" style="color:${st.color}">${st.name}</p><p class="stage-desc">${st.desc}</p></div>`;
  h+=`<div class="score-card"><h3>Category Breakdown</h3>`;
  for(const cat of CATEGORIES){const v=catScores[cat],p=Math.min(v,100),c=barColor(p);
    h+=`<div class="bar-row"><div class="bar-header"><span class="bar-label">${CAT_ICONS[cat]} ${CAT_LABELS[cat]}</span><span class="bar-val" style="color:${c}">${Math.round(v)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div></div>`;}
  h+=`<div class="overall-row"><span class="overall-label">Overall Score</span><span class="overall-val" style="color:${st.color}">${overallScore}/100</span></div></div>`;
  h+=overallScore>=100?`<button class="btn-main btn-full" style="background:linear-gradient(135deg,#66BB6A,#2E7D32)" disabled>🌍 Paradise Achieved! Score: 100/100</button>`:`<button class="btn-main btn-full" onclick="startGoals()">${goalDay>1?"Next Day\\'s Goals":"Start Daily Goals"}</button>`;
  document.getElementById('results-content').innerHTML=h;
  setTimeout(()=>renderLandscape(document.getElementById('mainCanvas'),overallScore),50);}

function startGoals(){dailyGoals=generateDailyGoals();completedGoals=new Set();renderGoals();showScreen('goals');}

function renderGoals(){
  let h=`<div class="goal-header"><p class="eyebrow">Goal Day ${goalDay}</p><h2>Today's Challenges</h2><p>Complete goals to improve your landscape.</p></div>`;
  h+=`<div class="mini-canvas-wrap"><canvas id="miniCanvas"></canvas></div>`;
  dailyGoals.forEach((g,i)=>{const d=completedGoals.has(i);
    h+=`<div class="goal-card${d?' done':''}" onclick="toggleGoal(${i})"><div class="goal-check">${d?'✓':'○'}</div><div><p class="goal-text">${g.text}</p><p class="goal-meta">${CAT_ICONS[g.cat]} ${CAT_LABELS[g.cat]} — +${g.points} pts</p></div></div>`;});
  h+=`<button class="btn-main btn-full" onclick="submitGoals()" ${completedGoals.size>0?'':'disabled'}>Submit (${completedGoals.size}/${dailyGoals.length} completed)</button>`;
  h+=`<button class="btn-secondary" onclick="renderResults();showScreen('results')">View Full Landscape</button>`;
  document.getElementById('goals-content').innerHTML=h;
  setTimeout(()=>renderLandscape(document.getElementById('miniCanvas'),overallScore),50);}

function toggleGoal(i){completedGoals.has(i)?completedGoals.delete(i):completedGoals.add(i);renderGoals();}

function submitGoals(){let earned=0;const texts=[];completedGoals.forEach(i=>{earned+=dailyGoals[i].points;texts.push(dailyGoals[i].text);});
  bonusPoints+=earned;allCompletedTexts=allCompletedTexts.concat(texts);overallScore=Math.min(100,overallScore+Math.round(earned/4));
  completedGoals.forEach(i=>{const g=dailyGoals[i];catScores[g.cat]=Math.min(100,catScores[g.cat]+Math.round(g.points/3));});
  goalDay++;renderResults();showScreen('results');}
</script>
